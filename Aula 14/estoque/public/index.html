<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Estoque IFB</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Estoque do IFB</h1>

        <div>
            <input type="text" id="nome" placeholder="Nome do Produto">
            <input type="number" id="qtd" placeholder="Quantidade">
            <input type="number" id="preco" placeholder="Preço">
            <button onclick="adicionar()">Adicionar</button>
        </div>

        <table border="1" style="margin-top: 20px; width: 100%;">
            <thead>
                <tr><th>Nome</th><th>Qtd</th><th>Preço</th><th>Ação</th></tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>

        <script>
            async function carregar() {
                const res = await fetch('/api/produtos');
                const produtos = await res.json();
                const tbody = document.getElementById('lista');
                tbody.innerHTML = produtos.map(p => `
                    <tr>
                        <td>${p.nome}</td>
                        <td>${p.qtd}</td>
                        <td>R$ ${p.preco}</td>
                        <td><button onclick="remover(${p.id})">Excluir</button></td>
                    </tr>  
                `).join('');
            }

            async function adicionar() {
                const nome = document.getElementById('nome').value;
                const qtd = document.getElementById('qtd').value;
                const preco = document.getElementById('preco').value;

                await fetch('/api/produtos', {
                    method: 'POST',
                    body: JSON.stringify({ nome, qtd, preco })
                });
                carregar();
            }

            }

            carregar();
        </script>
    </body>
</html>
